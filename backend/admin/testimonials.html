<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Testimonials – ShreeNova Tech Admin</title>
<link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><img src="../../public/logo.png" alt="SNT" onerror="this.style.display='none'" /><span>ShreeNova Tech</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div><a class="nav-item" data-page="dashboard.html" href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>
      <div class="nav-section">Management</div>
      <a class="nav-item" data-page="bookings.html" href="bookings.html"><span class="icon">📋</span><span>Bookings</span></a>
      <a class="nav-item" data-page="payments.html" href="payments.html"><span class="icon">💳</span><span>Payments</span></a>
      <a class="nav-item" data-page="contacts.html" href="contacts.html"><span class="icon">✉️</span><span>Contacts</span></a>
      <div class="nav-section">Website</div>
      <a class="nav-item" data-page="portfolio.html"    href="portfolio.html"><span class="icon">🖼️</span><span>Portfolio</span></a>
      <a class="nav-item" data-page="pricing.html"      href="pricing.html"><span class="icon">💰</span><span>Pricing</span></a>
      <a class="nav-item" data-page="testimonials.html" href="testimonials.html"><span class="icon">⭐</span><span>Testimonials</span></a>
      <a class="nav-item" data-page="faqs.html"         href="faqs.html"><span class="icon">❓</span><span>FAQs</span></a>
      <a class="nav-item" data-page="hosting.html"      href="hosting.html"><span class="icon">🌐</span><span>Hosting Plans</span></a>
      <a class="nav-item" data-page="blog.html"         href="blog.html"><span class="icon">📝</span><span>Blog</span></a>
      <div class="nav-section">System</div>
      <a class="nav-item" data-page="media.html"    href="media.html"><span class="icon">🗂️</span><span>Media Manager</span></a>
      <a class="nav-item" data-page="seo.html"      href="seo.html"><span class="icon">🔍</span><span>SEO Settings</span></a>
      <a class="nav-item" data-page="users.html"    href="users.html"><span class="icon">👥</span><span>Users</span></a>
      <a class="nav-item" data-page="settings.html" href="settings.html"><span class="icon">⚙️</span><span>Settings</span></a>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar user-initials">A</div><div class="sidebar-user-info"><strong class="user-name">Admin</strong><small class="user-role">super_admin</small></div></div></div>
  </aside>
  <div class="main-content" id="mainContent">
    <div class="topbar">
      <div class="topbar-left"><button class="toggle-btn" id="sidebarToggle">☰</button><span class="page-title">Testimonials</span></div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openAdd()">+ Add Testimonial</button>
        <button class="topbar-btn" onclick="logout()">🚪</button>
        <div class="topbar-user"><div class="topbar-avatar user-initials">A</div><span class="topbar-name user-name">Admin</span></div>
      </div>
    </div>
    <div class="page-body">
      <div class="card"><div class="card-body" style="padding:0">
        <div class="table-wrap"><table>
          <thead><tr><th>Name</th><th>Role</th><th>Rating</th><th>Quote</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="tbody"><tr><td colspan="6"><div class="empty-state"><p>Loading...</p></div></td></tr></tbody>
        </table></div>
      </div></div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="formModal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title" id="formTitle">Add Testimonial</span><button class="modal-close" onclick="closeModal('formModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label class="form-label">Name <span>*</span></label><input class="form-control" id="fName" /></div><div class="form-group"><label class="form-label">Role</label><input class="form-control" id="fRole" placeholder="e.g. Business Owner" /></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Rating (1-5)</label><input class="form-control" id="fRating" type="number" min="1" max="5" value="5" /></div><div class="form-group"><label class="form-label">Sort Order</label><input class="form-control" id="fSort" type="number" value="0" /></div></div>
      <div class="form-row full"><div class="form-group"><label class="form-label">Quote <span>*</span></label><textarea class="form-control" id="fQuote" rows="4"></textarea></div></div>
      <div class="form-group" style="flex-direction:row;align-items:center;gap:12px"><label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="fActive" checked /> Active</label></div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="save()">💾 Save</button><button class="btn btn-outline" onclick="closeModal('formModal')">Cancel</button></div>
  </div>
</div>

<script src="admin.js"></script>
<script>
let editId = null;
async function load() {
  const data = await apiFetch('/testimonials?all=1');
  const tbody = document.getElementById('tbody');
  if (!data?.success) return;
  tbody.innerHTML = data.data.length
    ? data.data.map(t => `<tr>
        <td><strong>${t.name}</strong></td><td>${t.role||'—'}</td>
        <td>${'⭐'.repeat(t.rating||5)}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.quote}</td>
        <td>${t.is_active?'<span class="badge badge-green">Active</span>':'<span class="badge badge-gray">Inactive</span>'}</td>
        <td style="display:flex;gap:6px">
          <button class="btn-icon" onclick="edit(${t.id})">✏️</button>
          <button class="btn-icon" onclick="del(${t.id})" style="color:#ef4444">🗑️</button>
        </td></tr>`).join('')
    : '<tr><td colspan="6"><div class="empty-state"><p>No testimonials yet</p></div></td></tr>';
}
function openAdd() {
  editId=null; document.getElementById('formTitle').textContent='Add Testimonial';
  ['fName','fRole','fQuote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fRating').value=5; document.getElementById('fSort').value=0;
  document.getElementById('fActive').checked=true; openModal('formModal');
}
async function edit(id) {
  const data = await apiFetch('/testimonials?all=1');
  const t = data?.data?.find(x=>x.id===id); if(!t) return;
  editId=id; document.getElementById('formTitle').textContent='Edit Testimonial';
  document.getElementById('fName').value=t.name||''; document.getElementById('fRole').value=t.role||'';
  document.getElementById('fRating').value=t.rating||5; document.getElementById('fSort').value=t.sort_order||0;
  document.getElementById('fQuote').value=t.quote||''; document.getElementById('fActive').checked=!!t.is_active;
  openModal('formModal');
}
async function save() {
  const name=document.getElementById('fName').value.trim(), quote=document.getElementById('fQuote').value.trim();
  if(!name||!quote){toast('Name and quote required','error');return;}
  const payload={name,role:document.getElementById('fRole').value.trim(),rating:parseInt(document.getElementById('fRating').value)||5,quote,sort_order:parseInt(document.getElementById('fSort').value)||0,is_active:document.getElementById('fActive').checked?1:0};
  const data=await apiFetch(editId?`/testimonials/${editId}`:'/testimonials',{method:editId?'PUT':'POST',body:JSON.stringify(payload)});
  if(data?.success){toast(editId?'Updated!':'Added!');closeModal('formModal');load();}else toast(data?.message||'Failed','error');
}
async function del(id){if(!confirmDelete('Delete this testimonial?'))return;const data=await apiFetch(`/testimonials/${id}`,{method:'DELETE'});if(data?.success){toast('Deleted');load();}else toast('Failed','error');}
document.addEventListener('DOMContentLoaded',load);
</script>
</body>
</html>
