<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Pricing – ShreeNova Tech Admin</title>
<link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><img src="../../public/logo.png" alt="SNT" onerror="this.style.display='none'" /><span>ShreeNova Tech</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a class="nav-item" data-page="dashboard.html" href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>
      <div class="nav-section">Management</div>
      <a class="nav-item" data-page="bookings.html"  href="bookings.html"><span class="icon">📋</span><span>Bookings</span></a>
      <a class="nav-item" data-page="payments.html"  href="payments.html"><span class="icon">💳</span><span>Payments</span></a>
      <a class="nav-item" data-page="contacts.html"  href="contacts.html"><span class="icon">✉️</span><span>Contacts</span></a>
      <div class="nav-section">Website</div>
      <a class="nav-item" data-page="portfolio.html"    href="portfolio.html"><span class="icon">🖼️</span><span>Portfolio</span></a>
      <a class="nav-item" data-page="pricing.html"      href="pricing.html"><span class="icon">💰</span><span>Pricing</span></a>
      <a class="nav-item" data-page="testimonials.html" href="testimonials.html"><span class="icon">⭐</span><span>Testimonials</span></a>
      <a class="nav-item" data-page="faqs.html"         href="faqs.html"><span class="icon">❓</span><span>FAQs</span></a>
      <a class="nav-item" data-page="hosting.html"      href="hosting.html"><span class="icon">🌐</span><span>Hosting Plans</span></a>
      <a class="nav-item" data-page="blog.html"         href="blog.html"><span class="icon">📝</span><span>Blog</span></a>
      <div class="nav-section">System</div>
      <a class="nav-item" data-page="media.html"    href="media.html"><span class="icon">🗂️</span><span>Media Manager</span></a>
      <a class="nav-item" data-page="seo.html"      href="seo.html"><span class="icon">🔍</span><span>SEO Settings</span></a>
      <a class="nav-item" data-page="users.html"    href="users.html"><span class="icon">👥</span><span>Users</span></a>
      <a class="nav-item" data-page="settings.html" href="settings.html"><span class="icon">⚙️</span><span>Settings</span></a>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar user-initials">A</div><div class="sidebar-user-info"><strong class="user-name">Admin</strong><small class="user-role">super_admin</small></div></div></div>
  </aside>

  <div class="main-content" id="mainContent">
    <div class="topbar">
      <div class="topbar-left"><button class="toggle-btn" id="sidebarToggle">☰</button><span class="page-title">Pricing Plans</span></div>
      <div class="topbar-right">
        <button class="topbar-btn" onclick="logout()">🚪</button>
        <div class="topbar-user"><div class="topbar-avatar user-initials">A</div><span class="topbar-name user-name">Admin</span></div>
      </div>
    </div>

    <div class="page-body">
      <div id="plansContainer" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px"></div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-backdrop" id="editModal">
  <div class="modal modal-lg">
    <div class="modal-header"><span class="modal-title" id="modalTitle">Edit Plan</span><button class="modal-close" onclick="closeModal('editModal')">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId" />
      <div class="form-row">
        <div class="form-group"><label class="form-label">Plan Name <span>*</span></label><input class="form-control" id="f_name" /></div>
        <div class="form-group"><label class="form-label">Price Display</label><input class="form-control" id="f_price" placeholder="₹9,999" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Price (Number)</label><input class="form-control" id="f_price_num" type="number" /></div>
        <div class="form-group"><label class="form-label">Renewal Text</label><input class="form-control" id="f_renewal" /></div>
      </div>
      <div class="form-row full">
        <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="f_description" rows="2"></textarea></div>
      </div>
      <div class="form-row full">
        <div class="form-group"><label class="form-label">Features (one per line)</label><textarea class="form-control" id="f_features" rows="8" placeholder="Feature 1&#10;Feature 2&#10;Feature 3"></textarea></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Sort Order</label><input class="form-control" id="f_sort_order" type="number" value="0" /></div>
        <div class="form-group" style="display:flex;gap:20px;align-items:flex-end;padding-bottom:4px">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" id="f_is_featured" /> Featured</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" id="f_is_active" checked /> Active</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="savePlan()">💾 Save Plan</button>
      <button class="btn btn-outline" onclick="closeModal('editModal')">Cancel</button>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
let allPlans = [];

async function loadPricing() {
  const data = await apiFetch('/pricing');
  if (!data?.success) return;
  allPlans = data.data;
  const container = document.getElementById('plansContainer');
  container.innerHTML = allPlans.map(p => `
    <div class="card">
      <div class="card-header">
        <span class="card-title">${p.badge} — ${p.name}</span>
        <div style="display:flex;gap:8px">
          ${p.is_featured ? '<span class="badge badge-yellow">⭐ Featured</span>' : ''}
          ${p.is_active ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-gray">Inactive</span>'}
        </div>
      </div>
      <div class="card-body">
        <div style="font-size:28px;font-weight:900;color:#f97316;margin-bottom:8px">${p.price}</div>
        <div style="font-size:13px;color:#64748b;margin-bottom:12px">${p.renewal||''}</div>
        <div style="font-size:13px;color:#374151;margin-bottom:16px">${p.description||''}</div>
        <ul style="list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:20px">
          ${(p.features||[]).map(f=>`<li style="font-size:13px;display:flex;align-items:center;gap:8px"><span style="color:#22c55e;font-weight:700">✓</span>${f}</li>`).join('')}
        </ul>
        <button class="btn btn-primary btn-sm" onclick="editPlan(${p.id})">✏️ Edit Plan</button>
      </div>
    </div>`).join('');
}

function editPlan(id) {
  const p = allPlans.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = `Edit ${p.name}`;
  document.getElementById('editId').value = id;
  document.getElementById('f_name').value = p.name || '';
  document.getElementById('f_price').value = p.price || '';
  document.getElementById('f_price_num').value = p.price_num || 0;
  document.getElementById('f_renewal').value = p.renewal || '';
  document.getElementById('f_description').value = p.description || '';
  document.getElementById('f_features').value = (p.features || []).join('\n');
  document.getElementById('f_sort_order').value = p.sort_order || 0;
  document.getElementById('f_is_featured').checked = !!p.is_featured;
  document.getElementById('f_is_active').checked = !!p.is_active;
  openModal('editModal');
}

async function savePlan() {
  const id = document.getElementById('editId').value;
  if (!id) return;
  const payload = {
    name:        document.getElementById('f_name').value.trim(),
    price:       document.getElementById('f_price').value.trim(),
    price_num:   parseInt(document.getElementById('f_price_num').value) || 0,
    renewal:     document.getElementById('f_renewal').value.trim(),
    description: document.getElementById('f_description').value.trim(),
    features:    document.getElementById('f_features').value.split('\n').map(s=>s.trim()).filter(Boolean),
    sort_order:  parseInt(document.getElementById('f_sort_order').value) || 0,
    is_featured: document.getElementById('f_is_featured').checked ? 1 : 0,
    is_active:   document.getElementById('f_is_active').checked ? 1 : 0,
  };
  const data = await apiFetch(`/pricing/${id}`, { method:'PUT', body: JSON.stringify(payload) });
  if (data?.success) { toast('Plan updated!'); closeModal('editModal'); loadPricing(); }
  else toast(data?.message || 'Failed', 'error');
}

document.addEventListener('DOMContentLoaded', loadPricing);
</script>
</body>
</html>
