<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>FAQs – ShreeNova Tech Admin</title>
<link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><img src="../../public/logo.png" alt="SNT" onerror="this.style.display='none'" /><span>ShreeNova Tech</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div><a class="nav-item" data-page="dashboard.html" href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>
      <div class="nav-section">Management</div>
      <a class="nav-item" data-page="bookings.html" href="bookings.html"><span class="icon">📋</span><span>Bookings</span></a>
      <a class="nav-item" data-page="payments.html" href="payments.html"><span class="icon">💳</span><span>Payments</span></a>
      <a class="nav-item" data-page="contacts.html" href="contacts.html"><span class="icon">✉️</span><span>Contacts</span></a>
      <div class="nav-section">Website</div>
      <a class="nav-item" data-page="portfolio.html"    href="portfolio.html"><span class="icon">🖼️</span><span>Portfolio</span></a>
      <a class="nav-item" data-page="pricing.html"      href="pricing.html"><span class="icon">💰</span><span>Pricing</span></a>
      <a class="nav-item" data-page="testimonials.html" href="testimonials.html"><span class="icon">⭐</span><span>Testimonials</span></a>
      <a class="nav-item" data-page="faqs.html"         href="faqs.html"><span class="icon">❓</span><span>FAQs</span></a>
      <a class="nav-item" data-page="hosting.html"      href="hosting.html"><span class="icon">🌐</span><span>Hosting Plans</span></a>
      <a class="nav-item" data-page="blog.html"         href="blog.html"><span class="icon">📝</span><span>Blog</span></a>
      <div class="nav-section">System</div>
      <a class="nav-item" data-page="media.html"    href="media.html"><span class="icon">🗂️</span><span>Media Manager</span></a>
      <a class="nav-item" data-page="seo.html"      href="seo.html"><span class="icon">🔍</span><span>SEO Settings</span></a>
      <a class="nav-item" data-page="users.html"    href="users.html"><span class="icon">👥</span><span>Users</span></a>
      <a class="nav-item" data-page="settings.html" href="settings.html"><span class="icon">⚙️</span><span>Settings</span></a>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar user-initials">A</div><div class="sidebar-user-info"><strong class="user-name">Admin</strong><small class="user-role">super_admin</small></div></div></div>
  </aside>
  <div class="main-content" id="mainContent">
    <div class="topbar">
      <div class="topbar-left"><button class="toggle-btn" id="sidebarToggle">☰</button><span class="page-title">FAQs</span></div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openAdd()">+ Add FAQ</button>
        <button class="topbar-btn" onclick="logout()">🚪</button>
        <div class="topbar-user"><div class="topbar-avatar user-initials">A</div><span class="topbar-name user-name">Admin</span></div>
      </div>
    </div>
    <div class="page-body">
      <div class="filter-bar">
        <select class="filter-select" id="catFilter" onchange="load()">
          <option value="">All Categories</option>
          <option value="general">General</option><option value="hosting">Hosting</option>
          <option value="seo">SEO</option><option value="payment">Payment</option>
        </select>
      </div>
      <div class="card"><div class="card-body" style="padding:0">
        <div class="table-wrap"><table>
          <thead><tr><th>Category</th><th>Question</th><th>Answer</th><th>Order</th><th>Actions</th></tr></thead>
          <tbody id="tbody"><tr><td colspan="5"><div class="empty-state"><p>Loading...</p></div></td></tr></tbody>
        </table></div>
      </div></div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="formModal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title" id="formTitle">Add FAQ</span><button class="modal-close" onclick="closeModal('formModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label class="form-label">Category</label><select class="form-control" id="fCat"><option value="general">General</option><option value="hosting">Hosting</option><option value="seo">SEO</option><option value="payment">Payment</option></select></div><div class="form-group"><label class="form-label">Sort Order</label><input class="form-control" id="fSort" type="number" value="0" /></div></div>
      <div class="form-row full"><div class="form-group"><label class="form-label">Question <span>*</span></label><input class="form-control" id="fQ" /></div></div>
      <div class="form-row full"><div class="form-group"><label class="form-label">Answer <span>*</span></label><textarea class="form-control" id="fA" rows="4"></textarea></div></div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="save()">💾 Save</button><button class="btn btn-outline" onclick="closeModal('formModal')">Cancel</button></div>
  </div>
</div>

<script src="admin.js"></script>
<script>
let editId=null;
async function load(){
  const cat=document.getElementById('catFilter').value;
  const data=await apiFetch('/faq'+(cat?`?category=${cat}`:''));
  const tbody=document.getElementById('tbody');
  if(!data?.success)return;
  tbody.innerHTML=data.data.length
    ?data.data.map(f=>`<tr><td><span class="badge badge-blue">${f.category}</span></td><td style="max-width:200px">${f.question}</td><td style="max-width:200px;color:#64748b;font-size:12px">${f.answer}</td><td>${f.sort_order}</td><td style="display:flex;gap:6px"><button class="btn-icon" onclick="edit(${f.id})">✏️</button><button class="btn-icon" onclick="del(${f.id})" style="color:#ef4444">🗑️</button></td></tr>`).join('')
    :'<tr><td colspan="5"><div class="empty-state"><p>No FAQs found</p></div></td></tr>';
}
function openAdd(){editId=null;document.getElementById('formTitle').textContent='Add FAQ';['fQ','fA'].forEach(id=>document.getElementById(id).value='');document.getElementById('fCat').value='general';document.getElementById('fSort').value=0;openModal('formModal');}
async function edit(id){
  const data=await apiFetch('/faq');const f=data?.data?.find(x=>x.id===id);if(!f)return;
  editId=id;document.getElementById('formTitle').textContent='Edit FAQ';
  document.getElementById('fCat').value=f.category||'general';document.getElementById('fQ').value=f.question||'';document.getElementById('fA').value=f.answer||'';document.getElementById('fSort').value=f.sort_order||0;
  openModal('formModal');
}
async function save(){
  const q=document.getElementById('fQ').value.trim(),a=document.getElementById('fA').value.trim();
  if(!q||!a){toast('Question and answer required','error');return;}
  const payload={category:document.getElementById('fCat').value,question:q,answer:a,sort_order:parseInt(document.getElementById('fSort').value)||0,is_active:1};
  const data=await apiFetch(editId?`/faq/${editId}`:'/faq',{method:editId?'PUT':'POST',body:JSON.stringify(payload)});
  if(data?.success){toast(editId?'Updated!':'Added!');closeModal('formModal');load();}else toast(data?.message||'Failed','error');
}
async function del(id){if(!confirmDelete('Delete this FAQ?'))return;const data=await apiFetch(`/faq/${id}`,{method:'DELETE'});if(data?.success){toast('Deleted');load();}else toast('Failed','error');}
document.addEventListener('DOMContentLoaded',load);
</script>
</body>
</html>
